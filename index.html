<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f0f1a">
<meta name="description" content="CardDex — Seu Pokédex Digital de Colecionador">
<title>CardDex — Pokédex Digital</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap">
<style>
:root {
  --bg-primary: #0a0a14;
  --bg-secondary: #111125;
  --bg-tertiary: #181830;
  --bg-card: #1a1a35;
  --bg-glass: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.15);
  --text-primary: #f0f0ff;
  --text-secondary: #9090b0;
  --text-muted: #5050707;
  --accent: #6c63ff;
  --accent-hover: #8079ff;
  --accent-glow: rgba(108,99,255,0.3);
  --gold: #ffd700;
  --gold-glow: rgba(255,215,0,0.3);
  --success: #00d4aa;
  --danger: #ff4d6d;
  --warning: #ffb347;
  --info: #4db8ff;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --shadow-glow: 0 0 40px rgba(108,99,255,0.15);
  --transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
  --font-main: 'Space Grotesk', 'Inter', sans-serif;
  --font-body: 'Inter', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{
  background:var(--bg-primary);
  color:var(--text-primary);
  font-family:var(--font-body);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.6;
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-secondary)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}

/* ====== UTILITIES ====== */
.hidden{display:none!important}
.flex{display:flex}
.flex-col{flex-direction:column}
.items-center{align-items:center}
.justify-center{justify-content:center}
.justify-between{justify-content:space-between}
.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-6{gap:24px}
.w-full{width:100%}
.text-sm{font-size:13px}
.text-xs{font-size:11px}
.text-lg{font-size:18px}
.text-xl{font-size:22px}
.font-bold{font-weight:700}
.font-medium{font-weight:500}
.text-accent{color:var(--accent)}
.text-gold{color:var(--gold)}
.text-success{color:var(--success)}
.text-danger{color:var(--danger)}
.text-muted{color:var(--text-secondary)}
.rounded{border-radius:var(--radius-md)}
.rounded-lg{border-radius:var(--radius-lg)}
.p-4{padding:16px}

/* ====== GLASS CARD ====== */
.glass-card{
  background:var(--bg-glass);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  backdrop-filter:blur(20px);
  transition:var(--transition);
}
.glass-card:hover{
  border-color:var(--border-hover);
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

/* ====== BUTTONS ====== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 20px;border-radius:var(--radius-md);border:none;cursor:pointer;
  font-family:var(--font-body);font-size:14px;font-weight:500;
  transition:var(--transition);text-decoration:none;white-space:nowrap;
}
.btn-primary{
  background:var(--accent);color:#fff;
  box-shadow:0 4px 20px var(--accent-glow);
}
.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{
  background:var(--bg-glass);color:var(--text-primary);
  border:1px solid var(--border);
}
.btn-secondary:hover{background:var(--bg-card);border-color:var(--border-hover)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{opacity:0.85}
.btn-icon{padding:8px;border-radius:var(--radius-sm);background:var(--bg-glass);border:1px solid var(--border);cursor:pointer;color:var(--text-secondary);transition:var(--transition)}
.btn-icon:hover{color:var(--text-primary);border-color:var(--border-hover)}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-lg{padding:14px 28px;font-size:16px}

/* ====== INPUTS ====== */
.input{
  width:100%;padding:10px 14px;
  background:var(--bg-glass);
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  color:var(--text-primary);
  font-family:var(--font-body);font-size:14px;
  transition:var(--transition);outline:none;
}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.input::placeholder{color:var(--text-secondary)}
select.input{cursor:pointer}
textarea.input{resize:vertical;min-height:80px}

/* ====== LOADING ====== */
#loading-screen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg-primary);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;
}
.loader-logo{
  font-family:var(--font-main);font-size:48px;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:pulse 1.5s ease-in-out infinite;
}
.loader-bar{
  width:200px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;
}
.loader-bar-inner{
  height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));
  border-radius:2px;animation:load-bar 1.5s ease-in-out infinite;
}
@keyframes load-bar{0%{width:0;transform:translateX(0)}50%{width:80%}100%{width:100%;transform:translateX(100%)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes slide-in-right{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes slide-in-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes card-flip{0%{transform:perspective(1000px) rotateY(90deg);opacity:0}100%{transform:perspective(1000px) rotateY(0deg);opacity:1}}
@keyframes holographic{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
@keyframes gold-shine{
  0%{background-position:-200% center}
  100%{background-position:200% center}
}
@keyframes rainbow-shift{
  0%{filter:hue-rotate(0deg)}
  100%{filter:hue-rotate(360deg)}
}
@keyframes particles{
  0%{transform:translateY(0) scale(1);opacity:1}
  100%{transform:translateY(-40px) scale(0);opacity:0}
}

/* ====== AUTH PAGE ====== */
#auth-page{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;position:relative;overflow:hidden;
}
.auth-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.15) 0%, transparent 60%),
             radial-gradient(ellipse at 80% 20%, rgba(255,215,0,0.1) 0%, transparent 50%),
             radial-gradient(ellipse at 60% 80%, rgba(0,212,170,0.08) 0%, transparent 50%);
}
.auth-card{
  width:100%;max-width:420px;position:relative;z-index:1;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  padding:40px;
  box-shadow:0 40px 80px rgba(0,0,0,0.5),var(--shadow-glow);
  animation:slide-in-up 0.5s ease;
}
.auth-logo{
  text-align:center;margin-bottom:32px;
}
.auth-logo-text{
  font-family:var(--font-main);font-size:36px;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.auth-logo-sub{font-size:13px;color:var(--text-secondary);margin-top:4px}
.auth-tabs{display:flex;gap:4px;background:var(--bg-secondary);border-radius:var(--radius-md);padding:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:8px;text-align:center;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;color:var(--text-secondary);transition:var(--transition);border:none;background:none}
.auth-tab.active{background:var(--accent);color:#fff}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:6px}
.input-group{position:relative}
.input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-secondary);font-size:16px}
.input-group .input{padding-left:38px}
.auth-forgot{
  text-align:right;margin-top:-8px;margin-bottom:16px;
}
.auth-forgot a{font-size:12px;color:var(--accent);text-decoration:none}
.auth-footer{margin-top:24px;text-align:center;font-size:13px;color:var(--text-secondary)}
.auth-floating{
  position:absolute;font-size:48px;opacity:0.1;animation:float 3s ease-in-out infinite;
}

/* ====== APP SHELL ====== */
#app{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{
  width:240px;background:var(--bg-secondary);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;
  z-index:100;transition:transform 0.3s ease;overflow-y:auto;
}
.sidebar-logo{
  padding:24px 20px 16px;
  font-family:var(--font-main);font-size:22px;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sidebar-user{
  padding:12px 20px;margin:0 12px;
  background:var(--bg-glass);border:1px solid var(--border);
  border-radius:var(--radius-md);margin-bottom:16px;
}
.user-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;color:#fff;flex-shrink:0;
}
.user-name{font-size:13px;font-weight:600;color:var(--text-primary)}
.user-role{font-size:11px;color:var(--text-secondary)}
.nav-section{padding:8px 12px;font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.8px;margin-top:8px}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 20px;margin:2px 8px;
  border-radius:var(--radius-md);cursor:pointer;
  font-size:14px;font-weight:500;color:var(--text-secondary);
  transition:var(--transition);border:none;background:none;width:calc(100% - 16px);
  text-align:left;
}
.nav-item:hover{background:var(--bg-glass);color:var(--text-primary)}
.nav-item.active{background:rgba(108,99,255,0.15);color:var(--accent)}
.nav-item.active svg,.nav-item.active .nav-icon{color:var(--accent)}
.nav-icon{font-size:18px;flex-shrink:0}
.nav-badge{
  margin-left:auto;background:var(--accent);color:#fff;
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;
}
.sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid var(--border)}

/* Main content */
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(10,10,20,0.8);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.topbar-title{font-family:var(--font-main);font-size:18px;font-weight:700}
.topbar-search{
  flex:1;max-width:400px;position:relative;
}
.topbar-search input{padding-left:38px}
.topbar-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-secondary)}
.topbar-actions{display:flex;align-items:center;gap:8px}
.content{padding:24px;flex:1}
.page{animation:fade-in 0.3s ease}

/* ====== DASHBOARD ====== */
.stats-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;margin-bottom:24px;
}
.stat-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px;
  transition:var(--transition);position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--card-accent,var(--accent));
}
.stat-card:hover{transform:translateY(-2px);border-color:var(--border-hover);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.stat-icon{
  width:40px;height:40px;border-radius:var(--radius-sm);
  background:rgba(108,99,255,0.1);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;margin-bottom:12px;
}
.stat-value{font-family:var(--font-main);font-size:28px;font-weight:700;color:var(--text-primary);line-height:1.2}
.stat-label{font-size:12px;color:var(--text-secondary);margin-top:4px;font-weight:500}
.stat-change{font-size:12px;margin-top:8px;display:flex;align-items:center;gap:4px}
.stat-change.up{color:var(--success)}
.stat-change.down{color:var(--danger)}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:var(--font-main);font-size:16px;font-weight:700}

/* ====== POKEMON CARDS ====== */
.cards-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:16px;
}
.poke-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;
  transition:var(--transition);position:relative;
  animation:card-flip 0.4s ease;
}
.poke-card:hover{
  transform:translateY(-4px) scale(1.02);
  border-color:var(--border-hover);
  box-shadow:0 16px 40px rgba(0,0,0,0.4);
}
.poke-card-img{
  width:100%;aspect-ratio:2/3;object-fit:cover;
  background:linear-gradient(135deg,var(--bg-tertiary),var(--bg-secondary));
  display:flex;align-items:center;justify-content:center;position:relative;
  overflow:hidden;
}
.poke-card-placeholder{
  width:100%;aspect-ratio:2/3;
  background:linear-gradient(135deg,var(--bg-tertiary),var(--bg-secondary));
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;color:var(--text-secondary);
}
.poke-card-info{padding:10px}
.poke-card-name{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.poke-card-meta{display:flex;align-items:center;justify-content:space-between}
.poke-card-num{font-size:11px;color:var(--text-secondary)}
.poke-card-qty{
  font-size:11px;font-weight:700;
  background:var(--accent);color:#fff;
  padding:2px 7px;border-radius:10px;
}
.rarity-badge{
  position:absolute;top:8px;right:8px;
  font-size:10px;font-weight:700;padding:3px 8px;
  border-radius:10px;letter-spacing:0.5px;
}
.rarity-common{background:rgba(120,120,130,0.8);color:#e0e0e8}
.rarity-uncommon{background:rgba(50,200,100,0.8);color:#d0ffe0}
.rarity-rare{background:rgba(50,100,255,0.8);color:#d0d8ff}
.rarity-double_rare{background:rgba(150,50,255,0.8);color:#ead0ff}
.rarity-illustration_rare{background:rgba(255,120,50,0.8);color:#fff0d0}
.rarity-special_illustration_rare{
  background:linear-gradient(135deg,rgba(200,50,50,0.8),rgba(255,50,100,0.8));
  color:#ffe0e8;animation:holographic 3s ease infinite;background-size:300% 300%;
}
.rarity-hyper_rare,.rarity-gold{
  background:linear-gradient(135deg,rgba(180,140,0,0.9),rgba(255,220,50,0.9));
  color:#3a2800;
  animation:gold-shine 2s linear infinite;
  background-size:300% auto;
}
.rarity-rainbow{
  background:linear-gradient(135deg,#ff6b6b,#ffa64d,#ffff66,#66ff66,#66ffff,#6666ff,#ff66ff);
  color:#fff;animation:rainbow-shift 3s linear infinite;
  text-shadow:0 1px 2px rgba(0,0,0,0.5);
}
.rarity-promo{background:rgba(50,150,255,0.8);color:#d0e8ff}
.rarity-ace_spec{background:rgba(220,50,180,0.8);color:#ffe0f8}
.favorite-star{
  position:absolute;top:8px;left:8px;
  background:rgba(0,0,0,0.5);border-radius:50%;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;transition:var(--transition);
}
.favorite-star:hover{transform:scale(1.2)}
.sale-tag{
  position:absolute;bottom:8px;left:8px;
  background:rgba(0,212,100,0.85);color:#003a18;
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;
}
.holographic-overlay{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,0),rgba(255,255,255,0.05),rgba(255,255,255,0));
  opacity:0;transition:opacity 0.3s;
}
.poke-card:hover .holographic-overlay{opacity:1}

/* ====== SCANNER ====== */
.scanner-zone{
  border:2px dashed var(--border);border-radius:var(--radius-xl);
  padding:60px 40px;text-align:center;cursor:pointer;
  transition:var(--transition);position:relative;overflow:hidden;
}
.scanner-zone.dragging{
  border-color:var(--accent);
  background:rgba(108,99,255,0.05);
}
.scanner-zone:hover{border-color:var(--border-hover)}
.scanner-icon{font-size:64px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
.scanner-title{font-family:var(--font-main);font-size:20px;font-weight:700;margin-bottom:8px}
.scanner-sub{font-size:14px;color:var(--text-secondary)}
.scan-preview{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:24px;margin-top:24px;
}
.scan-result{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:24px;margin-top:24px;
  animation:slide-in-up 0.4s ease;
}
.confidence-bar{
  height:6px;background:var(--bg-secondary);border-radius:3px;overflow:hidden;margin-top:8px;
}
.confidence-fill{
  height:100%;border-radius:3px;transition:width 1s ease;
  background:linear-gradient(90deg,var(--danger),var(--warning),var(--success));
}
.scan-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;
}
.scan-field{background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px}
.scan-field-label{font-size:11px;color:var(--text-secondary);margin-bottom:4px;font-weight:500}
.scan-field-value{font-size:14px;font-weight:600}
.scanner-options{display:flex;gap:12px;margin-bottom:24px}
.scan-option{
  flex:1;padding:16px;background:var(--bg-card);
  border:1px solid var(--border);border-radius:var(--radius-lg);
  cursor:pointer;text-align:center;transition:var(--transition);
}
.scan-option:hover{border-color:var(--accent);background:rgba(108,99,255,0.05)}
.scan-option-icon{font-size:28px;margin-bottom:8px}
.scan-option-label{font-size:13px;font-weight:500}
.camera-view{
  width:100%;aspect-ratio:16/9;background:#000;
  border-radius:var(--radius-lg);overflow:hidden;position:relative;
}
.camera-view video{width:100%;height:100%;object-fit:cover}
.camera-overlay{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.camera-frame{
  width:200px;height:280px;border:2px solid var(--accent);
  border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);
}
.ai-thinking{
  display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px;
}
.ai-spinner{
  width:60px;height:60px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin 0.8s linear infinite;
}
.ai-text{font-size:14px;color:var(--text-secondary);animation:pulse 1s ease-in-out infinite}

/* ====== MODAL ====== */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fade-in 0.2s ease;
}
.modal{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-xl);padding:32px;
  width:100%;max-width:600px;max-height:90vh;overflow-y:auto;
  animation:slide-in-up 0.3s ease;
  box-shadow:0 40px 80px rgba(0,0,0,0.5);
}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-title{font-family:var(--font-main);font-size:20px;font-weight:700}
.modal-close{
  width:32px;height:32px;border-radius:var(--radius-sm);
  background:var(--bg-glass);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-secondary);font-size:18px;transition:var(--transition);
}
.modal-close:hover{color:var(--text-primary);border-color:var(--border-hover)}
.modal-footer{margin-top:24px;display:flex;gap:12px;justify-content:flex-end}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* ====== CARD DETAIL ====== */
.card-detail{
  display:grid;grid-template-columns:300px 1fr;gap:24px;
}
.card-detail-img{
  background:var(--bg-secondary);border-radius:var(--radius-lg);
  overflow:hidden;aspect-ratio:2/3;position:relative;
}
.card-detail-img img{width:100%;height:100%;object-fit:cover}
.card-detail-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.card-qty-controls{display:flex;align-items:center;gap:8px;margin-top:8px}
.qty-btn{
  width:32px;height:32px;border-radius:var(--radius-sm);
  background:var(--bg-glass);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-primary);font-size:18px;font-weight:700;transition:var(--transition);
}
.qty-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.qty-display{font-size:20px;font-weight:700;min-width:40px;text-align:center}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.info-item{background:var(--bg-secondary);border-radius:var(--radius-md);padding:12px}
.info-label{font-size:11px;color:var(--text-secondary);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.info-value{font-size:14px;font-weight:500}
.history-list{margin-top:16px}
.history-item{
  display:flex;align-items:center;gap:12px;padding:10px 0;
  border-bottom:1px solid var(--border);
}
.history-icon{
  width:32px;height:32px;border-radius:var(--radius-sm);
  background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.history-text{font-size:13px;color:var(--text-secondary)}
.history-date{font-size:11px;color:var(--text-secondary);margin-left:auto}

/* ====== WISHLIST ====== */
.wishlist-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px;
  display:flex;align-items:center;gap:16px;transition:var(--transition);
}
.wishlist-card:hover{border-color:var(--border-hover)}
.wishlist-priority{
  width:8px;height:40px;border-radius:4px;flex-shrink:0;
}
.priority-high{background:var(--danger)}
.priority-medium{background:var(--warning)}
.priority-low{background:var(--success)}
.wishlist-info{flex:1;min-width:0}
.wishlist-name{font-size:14px;font-weight:600;margin-bottom:4px}
.wishlist-meta{font-size:12px;color:var(--text-secondary)}

/* ====== SALES ====== */
.sale-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px;transition:var(--transition);
}
.sale-status{
  display:inline-flex;align-items:center;gap:6px;padding:4px 10px;
  border-radius:10px;font-size:12px;font-weight:600;margin-bottom:12px;
}
.status-available{background:rgba(0,212,170,0.1);color:var(--success)}
.status-reserved{background:rgba(255,179,71,0.1);color:var(--warning)}
.status-sold{background:rgba(255,77,109,0.1);color:var(--danger)}
.sale-prices{display:flex;gap:16px;margin-top:12px}
.price-item{flex:1;background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px;text-align:center}
.price-label{font-size:11px;color:var(--text-secondary);margin-bottom:4px}
.price-value{font-size:16px;font-weight:700}
.price-value.profit{color:var(--success)}

/* ====== CHARTS ====== */
.chart-container{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px;
}
.chart-bar{display:flex;align-items:flex-end;gap:4px;height:120px;padding-top:8px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.bar-fill{
  width:100%;border-radius:4px 4px 0 0;background:var(--accent);
  transition:height 1s cubic-bezier(0.4,0,0.2,1);min-height:4px;
}
.bar-label{font-size:9px;color:var(--text-secondary);text-align:center;word-break:break-all}
.bar-val{font-size:10px;font-weight:600;color:var(--text-primary)}
.donut-chart{position:relative;display:inline-flex;align-items:center;justify-content:center}
.donut-center{position:absolute;text-align:center}

/* ====== FILTERS ====== */
.filters-bar{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;
  display:flex;gap:12px;flex-wrap:wrap;align-items:center;
}
.filter-chip{
  padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;
  background:var(--bg-secondary);border:1px solid var(--border);
  cursor:pointer;transition:var(--transition);color:var(--text-secondary);
}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-chip:hover{border-color:var(--border-hover);color:var(--text-primary)}

/* ====== TOAST ====== */
#toast-container{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  display:flex;flex-direction:column;gap:8px;
}
.toast{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-md);padding:12px 16px;
  display:flex;align-items:center;gap:10px;
  min-width:280px;max-width:360px;
  animation:slide-in-right 0.3s ease;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}
.toast.success{border-left:3px solid var(--success)}
.toast.error{border-left:3px solid var(--danger)}
.toast.info{border-left:3px solid var(--info)}
.toast.warning{border-left:3px solid var(--warning)}
.toast-icon{font-size:18px;flex-shrink:0}
.toast-msg{font-size:13px;flex:1}

/* ====== SKELETON ====== */
.skeleton{
  background:linear-gradient(90deg,var(--bg-secondary) 25%,var(--bg-tertiary) 50%,var(--bg-secondary) 75%);
  background-size:200% auto;animation:shimmer 1.5s linear infinite;
  border-radius:var(--radius-sm);
}

/* ====== EMPTY STATE ====== */
.empty-state{
  text-align:center;padding:80px 40px;
  animation:fade-in 0.5s ease;
}
.empty-icon{font-size:64px;margin-bottom:16px;opacity:0.3;animation:float 3s ease-in-out infinite}
.empty-title{font-size:18px;font-weight:600;margin-bottom:8px;color:var(--text-secondary)}
.empty-sub{font-size:14px;color:var(--text-secondary);max-width:300px;margin:0 auto 24px}

/* ====== PROGRESS ====== */
.progress-bar{height:6px;background:var(--bg-secondary);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--accent);transition:width 0.8s ease}

/* ====== MOBILE RESPONSIVE ====== */
.mobile-menu-btn{display:none;position:fixed;bottom:20px;right:20px;z-index:200;
  width:48px;height:48px;border-radius:50%;background:var(--accent);
  border:none;cursor:pointer;color:#fff;font-size:22px;
  box-shadow:0 4px 20px var(--accent-glow);
}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .mobile-menu-btn{display:flex;align-items:center;justify-content:center}
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .form-grid,.form-grid-3{grid-template-columns:1fr}
  .card-detail{grid-template-columns:1fr}
  .scan-grid{grid-template-columns:1fr}
  .content{padding:16px}
  .topbar{padding:10px 16px}
}

/* ====== REPORTS ====== */
.report-stat{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px;text-align:center;
}
.report-value{font-size:32px;font-weight:800;font-family:var(--font-main);
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.report-label{font-size:13px;color:var(--text-secondary);margin-top:4px}

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, getDoc, setDoc, increment, serverTimestamp, Timestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

// ===== FIREBASE CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyA8pCxi_DbzMh3nKZP7x2uzul2YMXLLv9k",
  authDomain: "carddex-br.firebaseapp.com",
  projectId: "carddex-br",
  storageBucket: "carddex-br.firebasestorage.app",
  messagingSenderId: "958568553030",
  appId: "1:958568553030:web:f13c336ab773db41698847",
  measurementId: "G-PR8VKEWTK4"
};
// Sem IA — cadastro manual após selecionar imagem
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
const googleProvider = new GoogleAuthProvider();

// ===== STATE =====
let currentUser = null;
let currentPage = 'dashboard';

// ===== AUTH =====
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-tab')[tab === 'login' ? 0 : 1].classList.add('active');
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
}

async function doLogin() {
  const phone = document.getElementById('login-phone').value.trim();
  const pass = document.getElementById('login-password').value;
  if (!phone || !pass) { showToast('Preencha todos os campos', 'error'); return; }
  // Use phone as email prefix for Firebase Auth
  const email = phone.replace(/\D/g, '') + '@carddex.app';
  try {
    showToast('Entrando...', 'info');
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    showToast(getAuthError(e.code), 'error');
  }
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const emailInput = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-password').value;
  if (!name || !phone || !pass) { showToast('Preencha todos os campos', 'error'); return; }
  if (pass.length < 6) { showToast('Senha deve ter pelo menos 6 caracteres', 'error'); return; }
  const email = emailInput || phone.replace(/\D/g, '') + '@carddex.app';
  try {
    showToast('Criando conta...', 'info');
    const uc = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(uc.user, { displayName: name });
    await setDoc(doc(db, 'usuarios', uc.user.uid), {
      uid: uc.user.uid, name, phone, email, createdAt: serverTimestamp(), updatedAt: serverTimestamp()
    });
    showToast('Conta criada! Bem-vindo!', 'success');
  } catch (e) {
    showToast(getAuthError(e.code), 'error');
  }
}

async function doLoginGoogle() {
  try {
    const result = await signInWithPopup(auth, googleProvider);
    const u = result.user;
    await setDoc(doc(db, 'usuarios', u.uid), {
      uid: u.uid, name: u.displayName, email: u.email, photo: u.photoURL,
      createdAt: serverTimestamp(), updatedAt: serverTimestamp()
    }, { merge: true });
  } catch (e) { showToast('Erro ao entrar com Google', 'error'); }
}

async function doLogout() {
  if (unsubscribeCollection) unsubscribeCollection();
  await signOut(auth);
}

async function showRecovery() {
  const phone = document.getElementById('login-phone').value.trim();
  const email = prompt('Digite seu email para recuperar a senha:');
  if (email) {
    try {
      await sendPasswordResetEmail(auth, email);
      showToast('Email de recuperação enviado!', 'success');
    } catch (e) { showToast('Email não encontrado', 'error'); }
  }
}

function getAuthError(code) {
  const errors = {
    'auth/user-not-found': 'Usuário não encontrado',
    'auth/wrong-password': 'Senha incorreta',
    'auth/email-already-in-use': 'Este número já está cadastrado',

    'auth/too-many-requests': 'Muitas tentativas. Tente mais tarde.',

  return errors[code] || 'Erro ao autenticar';

// ===== AUTH STATE =====
onAuthStateChanged(auth, async (user) => {
  document.getElementById('loading-screen').classList.add('hidden');
  if (user) {
    currentUser = user;
    document.getElementById('auth-page').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    const initials = (user.displayName || 'CD').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('user-avatar').textContent = initials;
    document.getElementById('user-name').textContent = user.displayName || 'Colecionador';
    await loadAllData();
    navigate('dashboard');

    currentUser = null;
    document.getElementById('auth-page').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
});

// ===== DATA LOADING =====
async function loadAllData() {
  if (!currentUser) return;
  try {
    const uid = currentUser.uid;
    // Collection
    const colQuery = query(collection(db, 'colecao'), where('uid', '==', uid), orderBy('createdAt', 'desc'));
    if (unsubscribeCollection) unsubscribeCollection();
    unsubscribeCollection = onSnapshot(colQuery, (snap) => {
      collectionData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateNavCounts();
      if (currentPage === 'dashboard') renderDashboard();
      if (currentPage === 'collection') renderCollection();
      if (currentPage === 'reports') renderReports();
    });
    // Wishlist
    const wQuery = query(collection(db, 'wishlist'), where('uid', '==', uid), orderBy('createdAt', 'desc'));
    const wSnap = await getDocs(wQuery);
    wishlistData = wSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Sales
    const sQuery = query(collection(db, 'vendas'), where('uid', '==', uid), orderBy('createdAt', 'desc'));
    const sSnap = await getDocs(sQuery);
    salesData = sSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateNavCounts();
  } catch (e) {
    console.error('Error loading data:', e);
  }
}

function updateNavCounts() {
  document.getElementById('nav-collection-count').textContent = collectionData.reduce((s, c) => s + (c.quantidade || 1), 0);
  document.getElementById('nav-wishlist-count').textContent = wishlistData.length;
}

// ===== NAVIGATION =====
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => {
    if (n.textContent.toLowerCase().includes(getPageName(page).toLowerCase())) n.classList.add('active');
  });
  document.getElementById('topbar-title').textContent = getPageTitle(page);
  if (window.innerWidth < 768) {
    document.getElementById('sidebar').classList.remove('open');
  }
  const titles = { dashboard:'Dashboard',scanner:'Adicionar Carta',collection:'Minha Coleção',wishlist:'Wishlist',sales:'À Venda',reports:'Relatórios',profile:'Perfil',settings:'Configurações' };
  document.getElementById('topbar-title').textContent = titles[page] || page;

  const content = document.getElementById('page-content');
  content.innerHTML = '<div style="display:flex;justify-content:center;padding:60px"><div class="ai-spinner" style="width:40px;height:40px"></div></div>';
  
  setTimeout(() => {
    switch(page) {
      case 'dashboard': renderDashboard(); break;
      case 'scanner': renderScanner(); break;
      case 'collection': renderCollection(); break;
      case 'wishlist': renderWishlist(); break;
      case 'sales': renderSales(); break;
      case 'reports': renderReports(); break;
      case 'profile': renderProfile(); break;
      case 'settings': renderSettings(); break;
    }
  }, 100);
}

function getPageName(p) {
  const m = {dashboard:'Dashboard',scanner:'Scanner',collection:'Coleção',wishlist:'Wishlist',sales:'Venda',reports:'Relatórios',profile:'Perfil',settings:'Configurações'};
  return m[p] || p;
}

  const m = {dashboard:'Dashboard',scanner:'Adicionar Carta',collection:'Minha Coleção',wishlist:'Wishlist',sales:'À Venda',reports:'Relatórios',profile:'Perfil',settings:'Configurações'};

function renderBarChart(containerId, data, colors) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const entries = Object.entries(data).sort((a,b) => b[1]-a[1]).slice(0, 8);
  const max = Math.max(...entries.map(e => e[1]), 1);
  el.innerHTML = entries.map(([key, val]) => {
    const pct = Math.round((val / max) * 100);
    const color = colors[key] || colors[key.toLowerCase()] || '#6c63ff';
    const label = key.replace(/_/g,' ').replace(/\b\w/g, l => l.toUpperCase()).slice(0,8);
    return `<div class="bar-wrap">
      <div class="bar-val">${val}</div>
      <div style="flex:1;width:100%;display:flex;align-items:flex-end">
        <div class="bar-fill" style="height:${pct}%;background:${color};width:100%"></div>
      </div>
      <div class="bar-label">${label}</div>
    </div>`;
  }).join('');
}

function scannerSelectMode(mode) {
  scannerMode = mode;
  ['upload','camera'].forEach(m => {
    const el = document.getElementById(`opt-${m}`);
    if (el) el.style.borderColor = m === mode ? 'var(--accent)' : '';
  });
  document.getElementById('scanner-zone-wrapper').classList.toggle('hidden', mode !== 'upload');
  document.getElementById('camera-zone').classList.toggle('hidden', mode !== 'camera');
  if (mode === 'camera') startCamera();
  else stopCamera();
}

async function startCamera() {
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    document.getElementById('camera-video').srcObject = videoStream;
  } catch (e) {
    showToast('Câmera não disponível', 'error');
    scannerSelectMode('upload');
  }
}

function stopCamera() {
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
}

function captureCamera() {
  const video = document.getElementById('camera-video');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  canvas.toBlob(blob => {
    stopCamera();
    const file = new File([blob], 'capture.jpg', { type: 'image/jpeg' });
    processImageFile(file);
  }, 'image/jpeg', 0.9);
}

async function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  processImageFile(file);
}

async function processImageFile(file) {
  window._currentFile = file;
  const reader = new FileReader();
  reader.onload = (e) => {
    const preview = e.target.result;
    // Show preview then open manual form with image already loaded
    document.getElementById('scanner-zone-wrapper').innerHTML = `
      <div class="scan-preview" style="text-align:center">
        <img src="${preview}" style="max-height:280px;max-width:100%;border-radius:var(--radius-md);object-fit:contain" alt="Preview">
        <div style="margin-top:12px;font-size:13px;color:var(--text-secondary)">Imagem carregada!</div>
        <div style="margin-top:12px;display:flex;gap:10px;justify-content:center">
          <button class="btn btn-primary" onclick="openAddCardManual()">✦ Preencher Dados da Carta</button>
          <button class="btn btn-secondary btn-sm" onclick="renderScanner()">✕ Trocar imagem</button>
        </div>
      </div>`;
  };
  reader.readAsDataURL(file);
}

function rejectScan() {
  showToast('Cancelado', 'info');
  renderScanner();
}

// ===== SAVE CARD =====
async function saveCard(cardData, extraData = {}) {
  if (!currentUser) return;
  try {
    // Check for duplicates
    const existingQuery = query(
      collection(db, 'colecao'),
      where('uid', '==', currentUser.uid),
      where('nome', '==', cardData.nome || ''),
      where('numero', '==', cardData.numero || '')
    );
    const existing = await getDocs(existingQuery);
    
    if (!existing.empty) {
      const existingDoc = existing.docs[0];
      const currentQty = existingDoc.data().quantidade || 1;
      await updateDoc(doc(db, 'colecao', existingDoc.id), {
        quantidade: currentQty + 1,
        updatedAt: serverTimestamp(),
        historico: [...(existingDoc.data().historico || []), { acao: 'adicionado', data: new Date().toISOString(), nota: 'Via Scanner' }]
      });
      showToast(`+1 ${cardData.nome} — Agora você tem ${currentQty + 1}`, 'success');
    } else {
      // Upload image if available
      let imagemUrl = cardData.imagemUrl || '';
      if (window._currentFile || window._scanBase64) {
        try {
          const fileToUpload = window._currentFile;
          if (fileToUpload) {
            const storageRef = ref(storage, `colecao/${currentUser.uid}/${Date.now()}_${fileToUpload.name}`);
            await uploadBytes(storageRef, fileToUpload);
            imagemUrl = await getDownloadURL(storageRef);
          }
        } catch (e) { console.warn('Image upload failed:', e); }
      }
      
      const newCard = {
        uid: currentUser.uid,
        nome: cardData.nome || 'Desconhecida',
        numero: cardData.numero || '',
        colecao: cardData.colecao || '',
        idioma: cardData.idioma || 'Português',
        hp: cardData.hp || '',
        tipo: cardData.tipo || 'Colorless',
        categoria: cardData.categoria || 'Pokémon',
        ilustrador: cardData.ilustrador || '',
        ano: cardData.ano || '',
        raridade: (cardData.raridade || 'Common').toLowerCase().replace(/\s+/g,'_'),
        estrelas: cardData.estrelas || 0,
        versao: cardData.versao || 'Normal',
        subtipo: cardData.subtipo || '',
        quantidade: 1,
        condicao: extraData.condicao || 'NM',
        precoPago: parseFloat(extraData.precoPago || 0),
        precoVenda: parseFloat(extraData.precoVenda || cardData.precoEstimado || 0),
        precoMinimo: parseFloat(extraData.precoMinimo || 0),
        observacoes: extraData.observacoes || cardData.observacoes || '',
        favorita: false,
        aVenda: false,
        imagemUrl,
        historico: [{ acao: 'criado', data: new Date().toISOString(), nota: 'Adicionado via upload' }],
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
        ...extraData
      };
      
      await addDoc(collection(db, 'colecao'), newCard);
      
      // Check if in wishlist and remove
      const wl = wishlistData.find(w => w.nome && w.nome.toLowerCase() === (cardData.nome || '').toLowerCase());
      if (wl) {
        await deleteDoc(doc(db, 'wishlist', wl.id));
        wishlistData = wishlistData.filter(w => w.id !== wl.id);
        showToast(`🎉 ${cardData.nome} removido da wishlist!`, 'success');
      }
      
      showToast(`✦ ${cardData.nome} adicionada à coleção!`, 'success');
    }
    
    window._currentFile = null;
    window._scanBase64 = null;
    navigate('collection');
  } catch (e) {
    console.error('Save error:', e);
    showToast('Erro ao salvar carta', 'error');
  }
}

function filterCollection(q) {
  searchQuery = q;
  const filtered = applyAllFilters();
  renderCollection(filtered);
}

function applyFilter(key, value) {
  if (value) activeFilters[key] = value;
  else delete activeFilters[key];
  renderCollection(applyAllFilters());
}

function toggleFilterChip(key) {
  if (activeFilters[key]) delete activeFilters[key];
  else activeFilters[key] = true;
  renderCollection(applyAllFilters());
}

function applyAllFilters() {
  let data = [...collectionData];
  if (searchQuery) data = data.filter(c => (c.nome||'').toLowerCase().includes(searchQuery.toLowerCase()) || (c.numero||'').includes(searchQuery) || (c.colecao||'').toLowerCase().includes(searchQuery.toLowerCase()));
  if (activeFilters.raridade) data = data.filter(c => c.raridade === activeFilters.raridade);
  if (activeFilters.tipo) data = data.filter(c => c.tipo === activeFilters.tipo);
  if (activeFilters.idioma) data = data.filter(c => c.idioma === activeFilters.idioma);
  if (activeFilters.favorita) data = data.filter(c => c.favorita);
  if (activeFilters.aVenda) data = data.filter(c => c.aVenda);
  if (activeFilters.repetidas) data = data.filter(c => (c.quantidade||1) > 1);
  return data;
}

// ===== CARD ACTIONS =====
async function toggleFavorite(cardId) {
  const card = collectionData.find(c => c.id === cardId);
  if (!card) return;
  await updateDoc(doc(db, 'colecao', cardId), { favorita: !card.favorita, updatedAt: serverTimestamp() });
  showToast(card.favorita ? 'Removido dos favoritos' : '⭐ Adicionado aos favoritos', 'success');
  closeModal();
}

async function toggleSale(cardId) {
  const card = collectionData.find(c => c.id === cardId);
  if (!card) return;
  const newStatus = !card.aVenda;
  await updateDoc(doc(db, 'colecao', cardId), { aVenda: newStatus, updatedAt: serverTimestamp() });
  if (newStatus) {
    // Add to vendas
    await addDoc(collection(db, 'vendas'), {
      uid: currentUser.uid, cardId, nome: card.nome, raridade: card.raridade,
      precoAnunciado: card.precoVenda || 0, precoVendido: 0, condicao: card.condicao || 'NM',
      quantidade: 1, status: 'disponivel', imagemUrl: card.imagemUrl || '',
      createdAt: serverTimestamp(), updatedAt: serverTimestamp()
    });
  }
  showToast(newStatus ? '💰 Carta listada à venda!' : 'Removida da venda', 'info');
  closeModal();
}

async function updateQuantity(cardId, delta) {
  const card = collectionData.find(c => c.id === cardId);
  if (!card) return;
  const newQty = Math.max(0, (card.quantidade || 1) + delta);
  if (newQty === 0) {
    if (!confirm('Quantidade chegou a zero. Deseja excluir a carta?')) return;
    await deleteCard(cardId); return;
  }
  await updateDoc(doc(db, 'colecao', cardId), {
    quantidade: newQty, updatedAt: serverTimestamp(),
    historico: [...(card.historico || []), { acao: delta > 0 ? 'adicionado' : 'removido', data: new Date().toISOString(), nota: `Quantidade ${delta > 0 ? 'aumentada' : 'reduzida'}: ${newQty}` }]
  });
  showToast(`Quantidade: ${newQty}`, 'info');
  closeModal();
}

async function deleteCard(cardId) {
  if (!confirm('Tem certeza que deseja excluir esta carta?')) return;
  await deleteDoc(doc(db, 'colecao', cardId));
  showToast('Carta removida', 'info');
  closeModal();
}

async function duplicateCard(cardId) {
  const card = collectionData.find(c => c.id === cardId);
  if (!card) return;
  const { id, ...cardData } = card;
  await addDoc(collection(db, 'colecao'), { ...cardData, quantidade: 1, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
  showToast('Carta duplicada!', 'success');
  closeModal();
}

async function saveManualCard(existingId) {
  const nome = document.getElementById('f-nome').value.trim();
  if (!nome) { showToast('Nome é obrigatório', 'error'); return; }
  
  const imgFile = document.getElementById('f-imagem').files[0];
  let imagemUrl = existingId ? (collectionData.find(c=>c.id===existingId)?.imagemUrl||'') : '';
  
  if (imgFile) {
    try {
      const storageRef = ref(storage, `colecao/${currentUser.uid}/${Date.now()}_${imgFile.name}`);
      await uploadBytes(storageRef, imgFile);
      imagemUrl = await getDownloadURL(storageRef);
    } catch (e) { console.warn('Image upload failed:', e); }
  }
  
  const cardData = {
    nome, numero: document.getElementById('f-numero').value,
    colecao: document.getElementById('f-colecao').value,
    idioma: document.getElementById('f-idioma').value,
    tipo: document.getElementById('f-tipo').value,
    hp: document.getElementById('f-hp').value,
    raridade: document.getElementById('f-raridade').value,
    versao: document.getElementById('f-versao').value,
    condicao: document.getElementById('f-condicao').value,
    quantidade: parseInt(document.getElementById('f-quantidade').value) || 1,
    precoPago: parseFloat(document.getElementById('f-precoPago').value) || 0,
    precoVenda: parseFloat(document.getElementById('f-precoVenda').value) || 0,
    observacoes: document.getElementById('f-observacoes').value,
    imagemUrl, updatedAt: serverTimestamp()
  };
  
  try {
    if (existingId) {
      await updateDoc(doc(db, 'colecao', existingId), cardData);
      showToast('Carta atualizada!', 'success');
    } else {
      await addDoc(collection(db, 'colecao'), {
        ...cardData, uid: currentUser.uid, favorita: false, aVenda: false,
        historico: [{ acao: 'criado', data: new Date().toISOString(), nota: 'Adicionado manualmente' }],
        createdAt: serverTimestamp()
      });
      showToast('Carta adicionada!', 'success');
    }
    closeModal();
  } catch (e) {
    console.error(e); showToast('Erro ao salvar', 'error');
  }
}

  const total = collectionData.reduce((s,c) => s+(c.quantidade||1), 0);

  const rarityCount = {};
  const colCount = {};
  collectionData.forEach(c => {
    rarityCount[(c.raridade||'common')] = (rarityCount[(c.raridade||'common')] || 0) + (c.quantidade||1);
    colCount[(c.colecao||'Sem coleção')] = (colCount[(c.colecao||'Sem coleção')] || 0) + 1;

  const topCards = [...collectionData].sort((a,b) => (b.precoVenda||0)-(a.precoVenda||0)).slice(0,5);

    <div class="report-stat"><div class="report-value">R$ ${investido.toFixed(0)}</div><div class="report-label">Investido</div></div>
    <div class="report-stat"><div class="report-value">R$ ${estimado.toFixed(0)}</div><div class="report-label">Estimado</div></div>
    <div class="report-stat"><div class="report-value" style="${lucro>=0?'':'background:linear-gradient(135deg,var(--danger),#ff8080);-webkit-background-clip:text;-webkit-text-fill-color:transparent'}">R$ ${lucro.toFixed(0)}</div><div class="report-label">Lucro/Prejuízo</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
    <div class="chart-container">
      <div class="section-title" style="margin-bottom:12px">Por Raridade</div>
      <div>${Object.entries(rarityCount).sort((a,b)=>b[1]-a[1]).map(([r,q]) => `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="font-size:12px;width:130px;color:var(--text-secondary)">${r.replace(/_/g,' ')}</div>
          <div style="flex:1;height:8px;background:var(--bg-secondary);border-radius:4px;overflow:hidden">
            <div style="height:100%;background:var(--accent);width:${Math.round(q/Math.max(...Object.values(rarityCount))*100)}%;border-radius:4px;transition:width 1s ease"></div>
          </div>
          <div style="font-size:12px;font-weight:600;min-width:24px;text-align:right">${q}</div>
        </div>`).join('')}</div>
    </div>
    <div class="chart-container">
      <div class="section-title" style="margin-bottom:12px">Por Coleção</div>
      <div>${Object.entries(colCount).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([col,q]) => `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="font-size:12px;width:130px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${col}</div>
          <div style="flex:1;height:8px;background:var(--bg-secondary);border-radius:4px;overflow:hidden">
            <div style="height:100%;background:var(--gold);width:${Math.round(q/Math.max(...Object.values(colCount))*100)}%;border-radius:4px;transition:width 1s ease"></div>
          </div>
          <div style="font-size:12px;font-weight:600;min-width:24px;text-align:right">${q}</div>
        </div>`).join('')}</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="chart-container">
      <div class="section-title" style="margin-bottom:12px">💎 Mais Valiosas</div>
      ${topCards.map((c,i) => `
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="width:24px;height:24px;border-radius:50%;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">${i+1}</div>
          <div style="flex:1;font-size:13px;font-weight:500">${c.nome}</div>
          <div style="font-size:13px;color:var(--gold);font-weight:700">R$ ${(c.precoVenda||0).toFixed(2)}</div>

      <div class="section-title" style="margin-bottom:12px">🔁 Mais Repetidas</div>
      ${mostRepeated.map((c,i) => `
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">

  </div>
</div>`;
}

  };
}

// ===== EXPORT =====
function exportCollection(format) {
  if (format === 'json') {
    const data = collectionData.map(({ id, ...c }) => c);
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    downloadBlob(blob, `carddex_colecao_${new Date().toISOString().slice(0,10)}.json`);
  } else if (format === 'csv') {
    const headers = ['Nome','Número','Coleção','Tipo','Raridade','Condição','Quantidade','Preço Pago','Preço Venda','Idioma','HP','Versão'];
    const rows = collectionData.map(c => [c.nome,c.numero,c.colecao,c.tipo,c.raridade,c.condicao,c.quantidade,c.precoPago,c.precoVenda,c.idioma,c.hp,c.versao].map(v => `"${v||''}"`).join(','));
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    downloadBlob(blob, `carddex_colecao_${new Date().toISOString().slice(0,10)}.csv`);
  }
  showToast('Exportação concluída!', 'success');
}

function downloadBlob(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename; a.click();
  URL.revokeObjectURL(a.href);
}

// ===== GLOBAL SEARCH =====
function globalSearch(q) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    if (q.length > 1) {
      searchQuery = q;
      navigate('collection');
    }
  }, 400);
}

// ===== MODAL =====
function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

// ===== TOAST =====
function showToast(msg, type = 'info') {
  const icons = { success:'✓', error:'✕', info:'ℹ', warning:'⚠' };
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ'}</span><span class="toast-msg">${msg}</span>`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity='0'; toast.style.transform='translateX(100%)'; toast.style.transition='all 0.3s ease'; setTimeout(() => toast.remove(), 300); }, 3500);
}
window.showToast = showToast;

// ===== RESPONSIVE =====

    document.getElementById('sidebar').classList.remove('open');

});

setTimeout(() => { document.getElementById('loading-screen').classList.add('hidden'); }, 3000);
